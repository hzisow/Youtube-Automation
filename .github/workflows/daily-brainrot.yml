name: Daily Brainrot Videos

# Free cloud scheduling. Runs daily; also runnable on demand.
#
# One-time secrets to add at:
#   github.com/hzisow/Vibecoding-Projects/settings/secrets/actions
#
#   GAMEPLAY_URL          (direct .mp4 download link to your gameplay clip)
#   REDDIT_CLIENT_ID      (Reddit "installed app" client ID; needed because
#                         Reddit blocks anonymous traffic from cloud IPs.
#                         Create one free at reddit.com/prefs/apps -> "installed app".)
#   CLIENT_SECRET_JSON    (contents of brainrot-pipeline/client_secret.json)
#   TOKEN_JSON            (contents of brainrot-pipeline/token.json after first
#                         local OAuth; refreshes itself on each run)
#   TIKTOK_CLIENT_JSON    (contents of brainrot-pipeline/tiktok_client.json)
#   TIKTOK_TOKEN_JSON     (contents of brainrot-pipeline/tiktok_token.json)
#
# Caveats:
#  - In Google "Testing" mode, the YouTube refresh token expires every 7 days.
#    Re-auth locally (run upload.py once) and re-paste TOKEN_JSON when it does.
#  - TikTok Sandbox / un-audited apps post to drafts only. The inbox flow still
#    runs hands-off; you'll tap Publish in the TikTok app.
#  - Flip ENABLE_YOUTUBE / ENABLE_TIKTOK below once the matching secrets exist.

on:
  schedule:
    - cron: "0 14 * * *"   # 14:00 UTC daily
  workflow_dispatch:
    inputs:
      count:
        description: "How many stories to render"
        default: "2"

env:
  ENABLE_YOUTUBE: "true"
  ENABLE_TIKTOK: "true"
  TIKTOK_MODE: "inbox"      # switch to "direct" after TikTok audit
  YOUTUBE_PRIVACY: "public"  # public / unlisted / private

jobs:
  generate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: brainrot-pipeline
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: brainrot-pipeline/requirements.txt

      - name: Cache ffmpeg apt package
        id: apt-cache
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: ffmpeg
          version: 1.0

      - name: Install ffmpeg (fallback if cache miss)
        if: steps.apt-cache.outcome == 'failure'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Fetch gameplay clip
        env:
          GAMEPLAY_URL: ${{ secrets.GAMEPLAY_URL }}
        run: |
          if [ -n "$GAMEPLAY_URL" ]; then
            curl -L "$GAMEPLAY_URL" -o assets/gameplay.mp4
          else
            echo "GAMEPLAY_URL secret is not set." && exit 1
          fi

      - name: Restore YouTube credentials
        if: env.ENABLE_YOUTUBE == 'true'
        env:
          CLIENT_SECRET_JSON: ${{ secrets.CLIENT_SECRET_JSON }}
          TOKEN_JSON: ${{ secrets.TOKEN_JSON }}
        run: |
          printf '%s' "$CLIENT_SECRET_JSON" > client_secret.json
          printf '%s' "$TOKEN_JSON" > token.json

      - name: Restore TikTok credentials
        if: env.ENABLE_TIKTOK == 'true'
        env:
          TIKTOK_CLIENT_JSON: ${{ secrets.TIKTOK_CLIENT_JSON }}
          TIKTOK_TOKEN_JSON: ${{ secrets.TIKTOK_TOKEN_JSON }}
        run: |
          printf '%s' "$TIKTOK_CLIENT_JSON" > tiktok_client.json
          printf '%s' "$TIKTOK_TOKEN_JSON" > tiktok_token.json

      - name: Generate and upload
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
        run: |
          COUNT="${{ github.event.inputs.count || '2' }}"
          FLAGS="--count $COUNT"
          [ "$ENABLE_YOUTUBE" = "true" ] && FLAGS="$FLAGS --upload --privacy $YOUTUBE_PRIVACY"
          [ "$ENABLE_TIKTOK"  = "true" ] && FLAGS="$FLAGS --tiktok --tiktok-mode $TIKTOK_MODE"
          python auto.py $FLAGS

      - name: Upload finished videos as build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: brainrot-videos
          path: brainrot-pipeline/output/*.mp4
          if-no-files-found: ignore

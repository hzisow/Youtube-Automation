name: Daily Brainrot Videos

# Free cloud scheduling. Runs daily; also runnable on demand.
#
# Uploads go through upload-post.com, which handles YouTube + TikTok auth
# on their side. One API key replaces both Google OAuth and TikTok OAuth.
#
# Required GitHub secrets (at
# github.com/hzisow/Youtube-Automation/settings/secrets/actions):
#
#   GAMEPLAY_URL          Direct .mp4 link to the looping gameplay clip.
#   REDDIT_CLIENT_ID      (Optional) Reddit installed-app client ID, only used
#                         by local refresh_stories.py; workflow forwards it.
#   UPLOADPOST_API_KEY    JWT from your upload-post.com dashboard.
#   UPLOADPOST_USER       The user label assigned in upload-post (e.g.
#                         "tiktokuploader") that maps to your connected
#                         YouTube + TikTok accounts.

on:
  schedule:
    # Two trigger windows per day. Each independently rolls a 38% dice
    # to actually post + sleeps 0-180 random minutes before doing so.
    # Math: 2 triggers * 0.38 ~= 0.76 posts/day ~= 3 posts per 4 days.
    # The random sleep means we never post at the same minute twice,
    # which keeps the cadence from looking botted.
    - cron: "0 14 * * *"   # 10:00 AM ET trigger (posts 10 AM - 1 PM ET)
    - cron: "0 22 * * *"   #  6:00 PM ET trigger (posts  6 PM - 9 PM ET)
  workflow_dispatch:
    inputs:
      count:
        description: "Bulk count for manual runs (scheduled runs upload 1 each)"
        default: "1"

env:
  ENABLE_PUBLISH: "true"
  YOUTUBE_PRIVACY: "public"  # public / unlisted / private

jobs:
  dice:
    runs-on: ubuntu-latest
    outputs:
      should_post: ${{ steps.roll.outputs.should_post }}
    steps:
      - id: roll
        name: Roll dice for cadence (~3 posts per 4 days)
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run -> posting unconditionally."
            echo "should_post=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ROLL=$((RANDOM % 100))
          THRESH=38
          if [ $ROLL -lt $THRESH ]; then
            echo "Rolled $ROLL (< $THRESH): POSTING this slot."
            echo "should_post=true" >> "$GITHUB_OUTPUT"
          else
            echo "Rolled $ROLL (>= $THRESH): skipping this slot."
            echo "should_post=false" >> "$GITHUB_OUTPUT"
          fi

  generate:
    needs: dice
    if: needs.dice.outputs.should_post == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      contents: write
    defaults:
      run:
        working-directory: brainrot-pipeline
    steps:
      - uses: actions/checkout@v4

      - name: Random pre-post sleep (0-180 min) so post time varies
        if: github.event_name == 'schedule'
        run: |
          SLEEP_MIN=$((RANDOM % 180))
          echo "Sleeping $SLEEP_MIN minutes before kicking off the render."
          sleep $((SLEEP_MIN * 60))

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: brainrot-pipeline/requirements.txt

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Fetch gameplay clip
        env:
          GAMEPLAY_URL: ${{ secrets.GAMEPLAY_URL }}
        run: |
          if [ -n "$GAMEPLAY_URL" ]; then
            curl -L "$GAMEPLAY_URL" -o assets/gameplay.mp4
          else
            echo "GAMEPLAY_URL secret is not set." && exit 1
          fi

      - name: Generate and upload
        env:
          UPLOADPOST_API_KEY: ${{ secrets.UPLOADPOST_API_KEY }}
          UPLOADPOST_USER: ${{ secrets.UPLOADPOST_USER }}
        run: |
          COUNT="${{ github.event.inputs.count || '1' }}"
          FLAGS="--count $COUNT --style story --cache stories_cache.json"
          if [ "$ENABLE_PUBLISH" = "true" ]; then
            FLAGS="$FLAGS --upload --tiktok --privacy $YOUTUBE_PRIVACY"
          fi
          python auto.py $FLAGS

      - name: Persist used.json so tomorrow's run skips today's stories
        if: always()
        run: |
          if [ -f used.json ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add used.json
            git diff --staged --quiet || git commit -m "chore: update used.json [skip ci]"
            git push || true
          fi

      - name: Upload finished videos as build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: brainrot-videos
          path: brainrot-pipeline/output/*.mp4
          if-no-files-found: ignore

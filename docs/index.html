<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TikTok Auth Callback</title>
  <style>
    body { font-family: -apple-system, Segoe UI, Arial, sans-serif; background:#0f0f0f;
           color:#fff; display:flex; min-height:100vh; align-items:center;
           justify-content:center; margin:0; }
    .card { background:#1a1a1b; padding:32px; border-radius:16px; max-width:560px;
            width:90%; box-shadow:0 8px 30px rgba(0,0,0,.5); }
    h1 { font-size:20px; margin:0 0 12px; }
    p { color:#b0b3b8; line-height:1.5; }
    code { display:block; background:#0f0f0f; border:1px solid #333; border-radius:8px;
           padding:14px; margin:16px 0; word-break:break-all; color:#0ff; font-size:15px; }
    button { background:#ff4500; color:#fff; border:0; border-radius:8px; padding:12px 18px;
             font-size:15px; cursor:pointer; }
    .muted { font-size:13px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Authorization code</h1>
    <p>Copy this code and paste it back into the terminal running
       <strong>tiktok_upload.py</strong>:</p>
    <code id="code">No code found in URL.</code>
    <button onclick="copyCode()">Copy code</button>
    <p class="muted" id="state"></p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    const state = params.get("state");
    if (code) document.getElementById("code").textContent = code;
    if (state) document.getElementById("state").textContent = "state: " + state;
    function copyCode() {
      if (code) navigator.clipboard.writeText(code);
    }
  </script>
</body>
</html>
